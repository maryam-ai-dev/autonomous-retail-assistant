spring:
  application:
    name: aisleon
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:retail_assistant}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration-hours: ${JWT_EXPIRATION_HOURS:72}

ebay:
  app-id: ${EBAY_APP_ID:}
  client-secret: ${EBAY_CLIENT_SECRET:}

python-ai-service:
  url: ${PYTHON_AI_SERVICE_URL:http://localhost:8001}

playwright:
  headless: ${PLAYWRIGHT_HEADLESS:true}
