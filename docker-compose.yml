services:
  db:
    image: postgres:16-alpine
    # TODO: configure
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - retail-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  spring-boot:
    build: ./backend/spring-boot
    # TODO: configure
    depends_on:
      db:
        condition: service_healthy
    networks:
      - retail-net

  ai-service:
    build: ./backend/ai-service
    # TODO: configure
    networks:
      - retail-net

  frontend:
    build: ./frontend
    # TODO: configure
    networks:
      - retail-net

volumes:
  pgdata:

networks:
  retail-net:
